name: ridenowappsss
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  socket_io_client: ^2.0.3
  share_plus: ^12.0.2
  shimmer: ^3.0.0
  flutter_screenutil: ^5.9.3
  go_router: ^17.1.0
  flutter_svg: ^2.2.0
  google_fonts: ^8.0.2
  device_info_plus: ^12.1.0
  dio: ^5.9.0
  flutter_secure_storage: ^10.0.0
  json_annotation: ^4.9.0
  fluttertoast: ^9.0.0
  flutter_contacts: ^2.0.1
  permission_handler: ^12.0.1
  google_maps_flutter: ^2.13.1
  geolocator: ^14.0.2
  shared_preferences: ^2.5.3
  google_places_flutter: ^2.1.1
  responsive_sizer: ^3.3.1
  get_it: ^9.0.5
  http: ^1.5.0
  webview_flutter: ^4.13.1
  intl: ^0.20.2
  geocoding: ^4.0.0
  image_picker: ^1.2.1
  http_parser: ^4.1.2
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  smile_id: ^11.2.8
  animated_digit: ^3.3.2
  percent_indicator: ^4.2.5
  crypto: ^3.0.7
  connectivity_plus: ^7.0.0
  webview_flutter_wkwebview: ^3.15.0
  webview_flutter_android: ^4.10.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/smile_config.json
    - .env

